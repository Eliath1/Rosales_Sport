<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Solicitar cotizacion - RS</title>
  <link rel="icon" href="/assets/rs-logo.png" type="image/png">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="demo-banner" data-i18n="quote.banner">Formulario de demostracion</div>
  <div class="promo-bar" data-i18n="promo.bar">Cotiza mayoreo y equipos</div>
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="logo"><img src="/assets/rs-logo.png" alt="RS"></a>
      <div class="header-icons">
        <div class="lang-switcher" role="group" aria-label="Language">
          <button type="button" class="lang-btn active" data-lang="es">ES</button>
          <button type="button" class="lang-btn" data-lang="en">EN</button>
        </div>
        <a href="/collections/jerseys.html" class="btn btn-outline" style="padding:0.5rem 1rem;font-size:11px;" data-i18n="quote.continue">Seguir comprando</a>
      </div>
    </div>
  </header>
  <main class="container">
    <div class="page-intro">
      <h1 data-i18n="quote.title">Solicitar cotizacion</h1>
      <p data-i18n="quote.intro">Cuentanos que necesitas.</p>
    </div>
    <form class="form-card" data-demo-form>
      <div class="form-group"><label for="name" data-i18n="quote.name">Nombre</label><input type="text" id="name" required></div>
      <div class="form-group"><label for="email" data-i18n="quote.email">Correo</label><input type="email" id="email" required></div>
      <div class="form-group"><label for="phone" data-i18n="quote.phone">Telefono</label><input type="tel" id="phone"></div>
      <div class="form-group"><label for="product-interest" data-i18n="quote.product">Producto</label><input type="text" id="product-interest"></div>
      <div class="form-group"><label for="notes" data-i18n="quote.notes">Notas</label><textarea id="notes"></textarea></div>
      <div class="form-group checkbox-group">
        <input type="checkbox" id="consent" required>
        <label for="consent" data-i18n="quote.consent">Acepto aviso de privacidad.</label>
      </div>
      <button type="submit" class="btn btn-primary" data-i18n="quote.submit">Enviar solicitud</button>
      <div class="form-success" data-i18n="quote.success">Gracias.</div>
    </form>
    <p>
      <a href="/custom/uniform.html" data-i18n="quote.custom.link">Uniformes personalizados</a>
      &nbsp;|&nbsp;
      <a href="/quote/bulk.html" data-i18n="quote.bulk.link">Cotizacion mayoreo</a>
    </p>
  </main>
  <footer class="site-footer"><p class="footer-copy" data-i18n="footer.copy">RS</p></footer>
  <script src="/js/messages.js"></script>
  <script src="/js/i18n.js"></script>
  <script src="/js/demo.js"></script>
</body>
</html>
