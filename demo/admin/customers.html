<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clientes - RS Admin</title>
  <link rel="icon" href="/assets/rs-logo.png" type="image/png">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="demo-banner" data-i18n="admin.banner">Panel admin demo - acceso de staff simulado</div>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <a href="/" class="logo"><img src="/assets/rs-logo.png" alt="Rosales Sport"></a>
      <div class="lang-switcher" style="margin:1rem 0;border-color:rgba(255,255,255,0.3);">
        <button type="button" class="lang-btn active" data-lang="es">ES</button>
        <button type="button" class="lang-btn" data-lang="en">EN</button>
      </div>
      <ul class="admin-nav">
        <li><a href="/admin/" data-i18n="admin.dashboard">Dashboard</a></li>
        <li><a href="/admin/designs.html" data-i18n="admin.designs">Disenos</a></li>
        <li><a href="/admin/quotes.html" data-i18n="admin.quotes">Cotizaciones</a></li>
        <li><a href="/admin/orders.html" data-i18n="admin.orders">Pedidos</a></li>
        <li><a href="/admin/customers.html" class="active" data-i18n="admin.customers">Clientes</a></li>
        <li><a href="/admin/testimonials.html" data-i18n="admin.testimonials">Testimonios</a></li>
        <li><a href="/" data-i18n="admin.view_store">Ver tienda</a></li>
      </ul>
    </aside>
    <div class="admin-main">
      <h1 style="margin:0 0 0.5rem;text-transform:uppercase;" data-i18n="admin.customers.title">Clientes</h1>
      <p style="margin:0 0 1.5rem;font-size:13px;color:var(--gray-600);" data-i18n="admin.customers.intro">Clientes simulados con historial de cotizaciones y pedidos.</p>
      <table class="data-table">
        <thead><tr>
          <th data-i18n="admin.col.name">Nombre</th>
          <th data-i18n="admin.col.type">Tipo</th>
          <th data-i18n="admin.col.city">Ciudad</th>
          <th data-i18n="admin.col.email">Correo</th>
          <th data-i18n="admin.quotes">Cotizaciones</th>
          <th data-i18n="admin.orders">Pedidos</th>
          <th data-i18n="admin.col.ltv">Valor total</th>
        </tr></thead>
        <tbody id="customers-table-body"></tbody>
      </table>
      <p id="customers-count-note" style="margin-top:0.75rem;font-size:12px;color:var(--gray-600);"></p>
    </div>
  </div>
  <script src="/js/messages.js"></script>
  <script src="/js/i18n.js"></script>
  <script src="/js/demo.js"></script>
  <script src="/js/mock-crm-data.js"></script>
  <script src="/js/admin-dashboard.js"></script>
</body>
</html>
