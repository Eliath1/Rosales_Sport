openapi: 3.0.3
info:
  title: Baseball Store CRM API
  description: |
    REST API for Mexico baseball store CRM - customers, catalog, quotes.
    Wave Zero scope. See docs/api/design-standards.md for conventions.
  version: 0.1.0
  contact:
    name: API Support
    email: dev@example.mitiendabeisbol.mx

servers:
 - url: https://crm.mitiendabeisbol.mx/api
    description: Production
 - url: http://localhost:3000/api
    description: Local development

tags:
 - name: auth
    description: Staff authentication
 - name: customers
    description: Customer and lead records
 - name: products
    description: Catalog
 - name: quotes
    description: Cotizaciones

paths:
  /auth/login:
    post:
      tags: [auth]
      summary: Staff login
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Session established
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /customers:
    get:
      tags: [customers]
      summary: List customers
      operationId: listCustomers
      parameters:
       - $ref: '#/components/parameters/Page'
       - $ref: '#/components/parameters/PageSize'
       - name: q
          in: query
          schema:
            type: string
          description: Search name or email
      responses:
        '200':
          description: Paginated customer list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerListResponse'
    post:
      tags: [customers]
      summary: Create customer
      operationId: createCustomer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomerRequest'
      responses:
        '201':
          description: Customer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerResponse'

  /quotes:
    get:
      tags: [quotes]
      summary: List quotes
      operationId: listQuotes
      parameters:
       - $ref: '#/components/parameters/Page'
       - name: status
          in: query
          schema:
            $ref: '#/components/schemas/QuoteStatus'
      responses:
        '200':
          description: Quote list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteListResponse'
    post:
      tags: [quotes]
      summary: Create quote
      operationId: createQuote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateQuoteRequest'
      responses:
        '201':
          description: Quote created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteResponse'

  /quotes/{quoteId}/send:
    post:
      tags: [quotes]
      summary: Send quote PDF via email
      operationId: sendQuote
      parameters:
       - $ref: '#/components/parameters/QuoteId'
      responses:
        '200':
          description: Quote sent
        '422':
          $ref: '#/components/responses/Unprocessable'

components:
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    QuoteId:
      name: quoteId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    Money:
      type: object
      required: [amountCents, currency]
      properties:
        amountCents:
          type: integer
          format: int64
          example: 129900
        currency:
          type: string
          example: MXN
        formatted:
          type: string
          example: '$1,299.00 MXN'

    QuoteStatus:
      type: string
      enum: [draft, sent, accepted, expired, rejected]

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    LoginResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            userId:
              type: string
              format: uuid
            role:
              type: string
              enum: [admin, sales, readonly]

    CreateCustomerRequest:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        customerType:
          type: string
          enum: [retail, wholesale, equipo]
          default: retail
        marketingConsent:
          type: boolean
          default: false

    Customer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        customerType:
          type: string

    CustomerResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Customer'

    CustomerListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Customer'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    CreateQuoteRequest:
      type: object
      required: [customerId, validUntil, lineItems]
      properties:
        customerId:
          type: string
          format: uuid
        validUntil:
          type: string
          format: date
        discountCents:
          type: integer
          default: 0
        notes:
          type: string
        lineItems:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/QuoteLineItemInput'

    QuoteLineItemInput:
      type: object
      required: [productVariantId, quantity]
      properties:
        productVariantId:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1

    Quote:
      type: object
      properties:
        id:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/QuoteStatus'
        validUntil:
          type: string
          format: date
        total:
          $ref: '#/components/schemas/Money'

    QuoteResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Quote'

    QuoteListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Quote'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        requestId:
          type: string

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string

  responses:
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unprocessable:
      description: Business rule violation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: session

security:
 - sessionCookie: []
